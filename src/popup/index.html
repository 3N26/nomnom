<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="popupTitle">NomNom Settings</title>
    <link rel="stylesheet" href="./styles/popup.css" />
  </head>
  <body>
    <div class="header">
      <img src="/icon.png" alt="NomNom" />
      <h1>NomNom</h1>
    </div>

    <div class="form-group">
      <label for="tabPoolCount" data-i18n="tabPoolCount">Tab Pool Count</label>
      <p class="description" data-i18n="tabPoolCountDesc">Number of tabs to open at once</p>
      <input type="number" id="tabPoolCount" min="1" max="20" value="3" />
    </div>

    <div class="form-group">
      <label for="nextTabShortcut" data-i18n="nextTabShortcut">Next Tab Shortcut</label>
      <p class="description" data-i18n="nextTabShortcutDesc">Press keys or click to set shortcut</p>
      <div class="hotkey-input">
        <input type="text" id="nextTabShortcut" readonly data-i18n-placeholder="hotkeyPlaceholder" placeholder="Click to record..." />
        <span class="hint" data-i18n="hotkeyRecording">Recording</span>
      </div>
    </div>

    <div class="form-group">
      <label for="limitOpenLinkCount" data-i18n="limitOpenLinks">Limit Open Links</label>
      <p class="description" data-i18n="limitOpenLinksDesc">Maximum links to open (0 = no limit)</p>
      <input type="number" id="limitOpenLinkCount" min="0" max="100" value="0" />
    </div>

    <div class="footer">v0.0.2</div>

    <script type="module" src="./index.ts"></script>
  </body>
</html>
